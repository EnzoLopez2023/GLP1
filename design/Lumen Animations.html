<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tare — App Animations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #0a0d10; color: #f5f3ee; height: 100%; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { width: 100%; height: 100vh; display: flex; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>

<script type="text/babel">
const SCENES = [
  { id: 'intro',     name: 'App Intro',          duration: 7,   sub: 'Cinematic logo reveal',   Comp: () => <IntroScene/>,     bg: '#f5f3ee', persistKey: 'lumen-intro' },
  { id: 'dashboard', name: 'Dashboard',          duration: 4,   sub: 'Tile stagger + tab bar',  Comp: () => <DashboardScene/>, bg: '#0a0d10', persistKey: 'lumen-dash' },
  { id: 'graph',     name: 'Graph Data Load',    duration: 5,   sub: 'Skeleton → trace → tick', Comp: () => <GraphLoadScene/>, bg: '#0a0d10', persistKey: 'lumen-graph' },
  { id: 'meds',      name: 'Meds Page',          duration: 5,   sub: 'Capsule splits open',     Comp: () => <MedsScene/>,      bg: '#0a0d10', persistKey: 'lumen-meds' },
  { id: 'glucose',   name: 'Glucose Page',       duration: 5,   sub: 'Drop · ripple · gauge',   Comp: () => <GlucoseScene/>,   bg: '#0a0d10', persistKey: 'lumen-glucose' },
  { id: 'weight',    name: 'Weight Page',        duration: 5,   sub: 'Dial swing + ticker',     Comp: () => <WeightScene/>,    bg: '#0a0d10', persistKey: 'lumen-weight' },
];

function App() {
  const [activeId, setActiveId] = React.useState(() => {
    try { return localStorage.getItem('lumen:active') || 'intro'; } catch { return 'intro'; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('lumen:active', activeId); } catch {}
  }, [activeId]);

  const active = SCENES.find(s => s.id === activeId) || SCENES[0];

  // Bump persistKey when user clicks "Replay" so Stage rewinds.
  const [replayCount, setReplayCount] = React.useState(0);
  const replay = () => setReplayCount(c => c + 1);

  return (
    <>
      <Sidebar scenes={SCENES} activeId={activeId} setActiveId={(id) => { setActiveId(id); }} onReplay={replay}/>
      <div style={{ flex: 1, position: 'relative', minWidth: 0 }}>
        <Stage
          key={`${active.id}-${replayCount}`}
          width={1280}
          height={780}
          duration={active.duration}
          background={active.bg}
          loop={true}
          autoplay={true}
          persistKey={active.persistKey}
        >
          <active.Comp/>
        </Stage>
      </div>
    </>
  );
}

function Sidebar({ scenes, activeId, setActiveId, onReplay }) {
  return (
    <div style={{
      width: 280, flexShrink: 0,
      background: '#0a0d10',
      borderRight: '1px solid rgba(255,255,255,0.06)',
      display: 'flex', flexDirection: 'column',
      padding: '24px 16px',
    }}>
      <div style={{ padding: '0 8px 20px' }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <svg width="24" height="24" viewBox="0 0 110 110">
            <defs>
              <linearGradient id="sideCap" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stopColor="oklch(0.68 0.14 35)"/>
                <stop offset="100%" stopColor="oklch(0.52 0.09 155)"/>
              </linearGradient>
            </defs>
            <rect x="22" y="14" width="66" height="82" rx="33" fill="url(#sideCap)"/>
            <line x1="22" y1="55" x2="88" y2="55" stroke="rgba(255,255,255,0.5)" strokeWidth="2"/>
          </svg>
          <div style={{
            fontFamily: 'Inter Tight, system-ui', fontWeight: 600, fontSize: 18,
            color: '#f5f3ee', letterSpacing: '-0.02em',
          }}>tare</div>
        </div>
        <div style={{
          marginTop: 10,
          fontFamily: 'Inter, system-ui', fontSize: 11,
          color: 'rgba(245,243,238,0.45)',
          letterSpacing: '0.08em', textTransform: 'uppercase',
        }}>Motion library</div>
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 4, overflowY: 'auto' }}>
        {scenes.map(s => {
          const active = s.id === activeId;
          return (
            <button key={s.id}
              onClick={() => setActiveId(s.id)}
              style={{
                textAlign: 'left',
                background: active ? 'rgba(255,255,255,0.06)' : 'transparent',
                border: 'none',
                borderRadius: 10,
                padding: '12px 14px',
                color: '#f5f3ee',
                cursor: 'pointer',
                display: 'flex', flexDirection: 'column', gap: 2,
                fontFamily: 'inherit',
              }}>
              <div style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                fontFamily: 'Inter Tight, system-ui',
                fontSize: 14, fontWeight: 600,
                color: active ? '#f5f3ee' : 'rgba(245,243,238,0.85)',
              }}>
                <span>{s.name}</span>
                <span style={{
                  fontFamily: 'JetBrains Mono, ui-monospace, monospace',
                  fontSize: 10,
                  color: 'rgba(245,243,238,0.4)',
                }}>{s.duration.toFixed(1)}s</span>
              </div>
              <div style={{
                fontSize: 12,
                color: active ? 'rgba(245,243,238,0.6)' : 'rgba(245,243,238,0.4)',
              }}>{s.sub}</div>
            </button>
          );
        })}
      </div>
      <button onClick={onReplay} style={{
        marginTop: 12,
        padding: '12px 16px',
        background: 'oklch(0.68 0.14 35)',
        border: 'none',
        borderRadius: 10,
        color: '#0f1419',
        fontFamily: 'inherit',
        fontWeight: 600, fontSize: 13,
        cursor: 'pointer',
        letterSpacing: '0.02em',
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      }}>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7a5 5 0 1 0 1.5-3.5L2 5M2 2v3h3" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
        Replay from start
      </button>
      <div style={{
        marginTop: 12, padding: '0 8px',
        fontSize: 11, color: 'rgba(245,243,238,0.35)',
        lineHeight: 1.5,
      }}>
        Space = play/pause · ←/→ scrub · Shift+arrows fast
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
