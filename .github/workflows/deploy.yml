name: Build & Deploy GLP-1

on:
  push:
    branches: [master]
  workflow_dispatch:  # allow manual runs from the Actions tab

concurrency:
  group: deploy-glp1
  cancel-in-progress: false  # never interrupt an in-flight deploy

jobs:
  deploy:
    # Runs on your home server (the self-hosted runner).
    runs-on: self-hosted

    defaults:
      run:
        # Work directly in the server's existing checkout so the
        # glp1-data Docker volume + glp1.db stay where they are.
        working-directory: C:\Source\Repo\GLP-1

    steps:
      - name: Sync repo
        shell: powershell
        run: |
          git fetch --all --prune
          git reset --hard origin/master

      - name: Build image
        shell: powershell
        run: docker compose build

      - name: Restart container
        shell: powershell
        run: docker compose up -d

      - name: Wait for server
        shell: powershell
        run: Start-Sleep -Seconds 4

      - name: Health check
        shell: powershell
        run: |
          $r = Invoke-RestMethod -Uri 'http://localhost:3004/api/health' -TimeoutSec 10
          if ($r.status -ne 'ok') { throw "Health check failed: $($r | ConvertTo-Json)" }
          Write-Host "OK - db: $($r.db)"
