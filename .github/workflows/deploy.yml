# GitHub Actions deploy for GLP-1 → Azure App Service (Linux containers).
# Runs on a GitHub-hosted ubuntu-latest runner — no self-hosted runner needed.
# Azure auth uses OIDC federated credentials (no static secrets, no DPAPI).

name: Build & Deploy GLP-1 to Azure

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: deploy-glp1
  cancel-in-progress: false

# Required for azure/login@v2 to request an OIDC JWT from GitHub.
permissions:
  id-token: write
  contents: read

env:
  RG:     rg-personal-apps-prod
  ACR:    acrenzolopez01
  IMAGE:  glp1:latest
  WEBAPP: app-glp1-prod-lwxhu7jxlrbtu

  # OIDC SP — these IDs are NOT secrets; the federated credential scopes them
  # to this repo + branch only (MIGRATION_RCA.md #9).
  AZURE_CLIENT_ID:       aea19703-bad3-4106-954a-29daaf03040f
  AZURE_TENANT_ID:       de625678-c55b-4494-9558-14946cbb6133
  AZURE_SUBSCRIPTION_ID: 1cf02211-8d77-4658-bb6a-0f83ec831c3b

  # Vite-baked AAD identifiers (Entra tenant for the user-facing app reg).
  VITE_AAD_CLIENT_ID: a38cd69e-8260-4b35-88f8-b93d2722cb41
  VITE_AAD_TENANT_ID: 52188f12-db6b-46c6-88ff-08c802f0ed3b

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ env.AZURE_CLIENT_ID }}
          tenant-id:       ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Build image in ACR
        # ACR builds server-side — no Docker daemon needed on the runner.
        # VITE_* vars must be baked in at build time (MIGRATION_RCA.md #3).
        run: |
          az acr build \
            --registry "$ACR" \
            --image "$IMAGE" \
            --build-arg "VITE_AAD_CLIENT_ID=$VITE_AAD_CLIENT_ID" \
            --build-arg "VITE_AAD_TENANT_ID=$VITE_AAD_TENANT_ID" \
            .

      - name: Restart web app to pull new image
        run: az webapp restart -g "$RG" -n "$WEBAPP"

      - name: Wait for app to come up
        # Container cold start (Docker pull + Node boot) on B1 reliably
        # takes 2-4 minutes. Poll /api/health for up to 5 minutes.
        run: |
          url="https://$WEBAPP.azurewebsites.net/api/health"
          for i in $(seq 1 60); do
            if curl -fsS --max-time 8 "$url" > /dev/null 2>&1; then
              echo "Healthy after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "Health check did not pass within 5 min" >&2
          exit 1
