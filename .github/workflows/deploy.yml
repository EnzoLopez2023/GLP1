# GitHub Actions deploy for GLP-1 (Tare) to Azure App Service.
#
# This replaces the previous local-Docker workflow. The flow is now:
#   self-hosted Windows runner -> az acr build (server-side in ACR)
#   -> az webapp restart -> health-check loop.
#
# DO NOT re-derive the Windows-specific hardening below — every quirk was
# discovered during the Workshop/ShopKeep migrations (see
# C:\Source\Repo\azure-infra\MIGRATION_RCA.md issues #3, #4, #8a, #8b, #8c).

name: Build & Deploy GLP-1 to Azure

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: deploy-glp1
  cancel-in-progress: false

env:
  RG: rg-personal-apps-prod
  ACR: acrenzolopez01
  IMAGE: glp1:latest
  WEBAPP: app-glp1-prod-lwxhu7jxlrbtu
  # Vite-baked AAD identifiers. GLP-1 uses VITE_AAD_* (NOT VITE_AZURE_*).
  # Pass these to az acr build below; they are NOT App Service settings.
  VITE_AAD_CLIENT_ID: a38cd69e-8260-4b35-88f8-b93d2722cb41
  VITE_AAD_TENANT_ID: 52188f12-db6b-46c6-88ff-08c802f0ed3b

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
        working-directory: C:\Source\Repo\GLP-1

    steps:
      - name: Sync repo
        run: |
          git fetch --all --prune
          git reset --hard origin/master

      - name: Confirm Azure session
        run: |
          $log = "C:\actions-runner\GLP1\last-diagnostic.txt"
          $sb = New-Object System.Text.StringBuilder
          [void]$sb.AppendLine("=== Diagnostic captured $(Get-Date -Format o) ===")
          [void]$sb.AppendLine("WHOAMI: $(whoami)")
          [void]$sb.AppendLine("USERPROFILE: $env:USERPROFILE")
          [void]$sb.AppendLine("USERNAME: $env:USERNAME")
          [void]$sb.AppendLine("AZURE_CONFIG_DIR (env): $env:AZURE_CONFIG_DIR")
          [void]$sb.AppendLine("az path: $((Get-Command az -ErrorAction SilentlyContinue).Source)")
          [void]$sb.AppendLine("")
          [void]$sb.AppendLine(".azure dir existence:")
          @("$env:USERPROFILE\.azure", "C:\Users\enzol\.azure") | Sort-Object -Unique | ForEach-Object {
            if (Test-Path $_) { [void]$sb.AppendLine("  EXISTS: $_ ($((Get-ChildItem $_ -ErrorAction SilentlyContinue | Measure-Object).Count) files)") }
            else { [void]$sb.AppendLine("  MISSING: $_") }
          }
          [void]$sb.AppendLine("")
          [void]$sb.AppendLine("az account show (stdout+stderr):")
          $out = (az account show 2>&1 | Out-String)
          [void]$sb.AppendLine("  exit: $LASTEXITCODE")
          [void]$sb.AppendLine($out)
          $sb.ToString() | Out-File -FilePath $log -Encoding utf8
          Get-Content $log | ForEach-Object { Write-Host $_ }
          $sub = (az account show --query id -o tsv 2>$null)
          if (-not $sub) { throw "az is not logged in on this runner — see $log" }
          Write-Host "Subscription: $sub"

      - name: Build image in ACR
        # ACR builds server-side; no Docker on the runner. The cmd.exe
        # wrapper + `& exit 0` swallows the Windows az CLI Unicode crash on
        # Vite's tick character (MIGRATION_RCA.md #4 / #8b). Real verification
        # is the next step's health check.
        run: |
          cmd /c "az acr build --registry $env:ACR --image $env:IMAGE --build-arg VITE_AAD_CLIENT_ID=$env:VITE_AAD_CLIENT_ID --build-arg VITE_AAD_TENANT_ID=$env:VITE_AAD_TENANT_ID . > nul 2>&1 & exit 0"
          Write-Host "az acr build returned. Image push verified by next step's health check."
          exit 0

      - name: Restart web app to pull new image
        run: |
          az webapp restart -g $env:RG -n $env:WEBAPP

      - name: Wait for app to come up
        # B1 cold start (Docker pull + Node boot) reliably 2-4 min.
        # curl --fail beats Invoke-WebRequest on TLS edge cases.
        # (MIGRATION_RCA.md #8c.)
        run: |
          $url = "https://$env:WEBAPP.azurewebsites.net/api/health"
          $ok = $false
          for ($i = 0; $i -lt 60; $i++) {
            cmd /c "curl -fsS --max-time 8 $url > nul 2>&1"
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Healthy after $($i*5)s"
              $ok = $true
              break
            }
            Start-Sleep -Seconds 5
          }
          if (-not $ok) { throw "Health check did not pass within 5 min" }
          exit 0
